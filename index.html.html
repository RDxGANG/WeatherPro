<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>WeatherPro | Advanced Multi-Layer Radar System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #131827;
            --bg-card: rgba(19, 24, 39, 0.85);
            --text-primary: #f0f4ff;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --accent-green: #10b981;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --card-radius: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .light-mode {
            --bg-primary: #f0f4ff;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.92);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: var(--transition);
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; overflow: hidden; pointer-events: none;
        }
        .bg-circle {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.25;
            animation: float 20s infinite;
        }
        .bg-circle-1 { width: 400px; height: 400px; background: var(--accent-purple); top: -100px; right: -100px; }
        .bg-circle-2 { width: 350px; height: 350px; background: var(--accent-blue); bottom: -80px; left: -80px; animation-delay: -7s; }
        .bg-circle-3 { width: 300px; height: 300px; background: var(--accent-cyan); top: 50%; left: 50%; animation-delay: -14s; }
        @keyframes float { 
            0%, 100% { transform: translate(0, 0) scale(1); } 
            33% { transform: translate(30px, -50px) scale(1.1); } 
            66% { transform: translate(-20px, 20px) scale(0.9); } 
        }

        .app-container { position: relative; z-index: 1; max-width: 1500px; margin: 0 auto; padding: 20px; }

        /* Header */
        .header {
            display: flex; align-items: center; justify-content: space-between; 
            padding: 18px 28px; background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 20px; 
            margin-bottom: 25px; box-shadow: var(--glass-shadow); flex-wrap: wrap; gap: 15px;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { 
            width: 45px; height: 45px; background: var(--gradient-3); border-radius: 14px; 
            display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; 
        }
        .logo-text { 
            font-size: 28px; font-weight: 800; background: var(--gradient-1); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }

        .search-wrapper { position: relative; flex: 1; max-width: 500px; }
        .search-box { 
            display: flex; align-items: center; background: var(--bg-secondary);
            border: 2px solid var(--glass-border); border-radius: 50px; 
            padding: 8px 8px 8px 20px; transition: var(--transition); 
        }
        .search-box:focus-within { 
            border-color: var(--accent-blue); box-shadow: 0 0 0 4px rgba(59,130,246,0.1); 
        }
        .search-box input { 
            flex: 1; border: none; background: none; outline: none; 
            color: var(--text-primary); font-size: 16px; font-family: 'Plus Jakarta Sans', sans-serif; 
        }
        .search-btn { 
            width: 42px; height: 42px; border-radius: 50%; border: none; 
            background: var(--gradient-3); color: white; cursor: pointer; 
            font-size: 18px; transition: var(--transition); flex-shrink: 0; 
        }
        .search-btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(59,130,246,0.4); }

        .suggestions-dropdown {
            position: absolute; top: calc(100% + 8px); left: 0; right: 0;
            background: var(--bg-secondary); border: 1px solid var(--glass-border);
            border-radius: 16px; max-height: 250px; overflow-y: auto;
            z-index: 1000; box-shadow: var(--glass-shadow); display: none;
        }
        .suggestions-dropdown.active { display: block; }
        .suggestion-item { 
            padding: 12px 20px; cursor: pointer; transition: var(--transition);
            border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; gap: 10px; 
        }
        .suggestion-item:hover { background: rgba(59,130,246,0.1); }

        .header-actions { display: flex; gap: 10px; align-items: center; }
        .icon-btn { 
            width: 42px; height: 42px; border-radius: 14px; border: 1px solid var(--glass-border);
            background: var(--glass-bg); backdrop-filter: blur(10px); color: var(--text-primary);
            cursor: pointer; font-size: 18px; transition: var(--transition);
            display: flex; align-items: center; justify-content: center; 
        }
        .icon-btn:hover { background: var(--accent-blue); color: white; transform: translateY(-2px); }
        .unit-btn { 
            padding: 8px 16px; border-radius: 50px; border: 1px solid var(--glass-border);
            background: var(--glass-bg); backdrop-filter: blur(10px); color: var(--text-primary);
            cursor: pointer; font-weight: 600; font-size: 14px; transition: var(--transition); 
        }
        .unit-btn:hover { background: var(--accent-purple); color: white; }

        /* Weather Card */
        .weather-card {
            background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            border-radius: var(--card-radius); padding: 30px; box-shadow: var(--glass-shadow);
            position: relative; overflow: hidden;
        }
        .weather-card::before { 
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--gradient-3); 
        }

        .city-name { font-size: 32px; font-weight: 700; cursor: pointer; }
        .country-badge { background: var(--accent-blue); padding: 4px 12px; border-radius: 50px; font-size: 14px; }
        .temperature { font-size: 72px; font-weight: 800; background: var(--gradient-3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .metrics-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 20px; 
        }
        .metric-box { 
            background: var(--glass-bg); border: 1px solid var(--glass-border); 
            border-radius: 16px; padding: 18px; text-align: center; transition: var(--transition); 
        }
        .metric-box:hover { transform: translateY(-2px); border-color: var(--accent-blue); }
        .metric-value { font-size: 22px; font-weight: 700; }
        .metric-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }

        /* Radar Section */
        .radar-container {
            background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            border-radius: var(--card-radius); padding: 20px; box-shadow: var(--glass-shadow);
            margin-bottom: 25px;
        }
        
        .layer-controls {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px;
        }
        
        .layer-btn {
            padding: 10px 18px; border-radius: 50px; border: 2px solid var(--glass-border);
            background: var(--glass-bg); color: var(--text-primary); cursor: pointer;
            font-size: 13px; font-weight: 600; transition: var(--transition);
            display: flex; align-items: center; gap: 6px;
        }
        
        .layer-btn:hover {
            background: rgba(59,130,246,0.15); border-color: var(--accent-blue);
        }
        
        .layer-btn.active {
            background: var(--accent-blue); border-color: var(--accent-blue); color: white;
        }
        
        .layer-btn i { font-size: 16px; }

        #radarMap { 
            height: 500px; border-radius: 16px; border: 1px solid var(--glass-border); z-index: 1; 
        }

        .legend-bar {
            display: flex; justify-content: center; gap: 20px; margin-top: 12px;
            font-size: 11px; color: var(--text-secondary); flex-wrap: wrap;
        }
        .legend-item {
            display: flex; align-items: center; gap: 6px;
        }
        .legend-color {
            width: 20px; height: 10px; border-radius: 3px;
        }

        .daily-item { 
            display: flex; align-items: center; justify-content: space-between; padding: 14px;
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 14px; margin-bottom: 6px;
        }
        
        .loading-overlay { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center; z-index: 2000; 
        }
        .loader-spinner { 
            width: 60px; height: 60px; border: 4px solid var(--glass-border);
            border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }

        @media (max-width: 1024px) {
            .metrics-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .header { flex-direction: column; }
            .temperature { font-size: 52px; }
            #radarMap { height: 350px; }
            .layer-btn { padding: 8px 12px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="bg-circle bg-circle-1"></div>
        <div class="bg-circle bg-circle-2"></div>
        <div class="bg-circle bg-circle-3"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-satellite"></i></div>
                <span class="logo-text">WeatherPro Radar</span>
            </div>
            <div class="search-wrapper">
                <div class="search-box">
                    <i class="fas fa-search" style="color: var(--text-secondary); margin-right: 10px;"></i>
                    <input type="text" id="searchInput" placeholder="Search any city..." autocomplete="off">
                    <button class="search-btn" id="searchBtn"><i class="fas fa-arrow-right"></i></button>
                </div>
                <div class="suggestions-dropdown" id="suggestionsDropdown"></div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="geoBtn"><i class="fas fa-location-crosshairs"></i></button>
                <button class="unit-btn" id="unitToggle"><span>°C</span> / <span style="opacity:0.5">°F</span></button>
                <button class="icon-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
            </div>
        </header>

        <!-- Full Radar System -->
        <div class="radar-container">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                <div class="section-title" style="margin-bottom: 0;">
                    <i class="fas fa-satellite-dish" style="color: var(--accent-cyan);"></i> 
                    Meteorological Radar System
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="icon-btn" id="zoomInBtn" title="Zoom In"><i class="fas fa-plus"></i></button>
                    <button class="icon-btn" id="zoomOutBtn" title="Zoom Out"><i class="fas fa-minus"></i></button>
                    <button class="icon-btn" id="resetViewBtn" title="Reset View"><i class="fas fa-expand"></i></button>
                </div>
            </div>
            
            <!-- Layer Toggle Buttons -->
            <div class="layer-controls">
                <button class="layer-btn active" data-layer="temp" id="tempLayerBtn">
                    <i class="fas fa-temperature-high"></i> Temperature
                </button>
                <button class="layer-btn" data-layer="wind" id="windLayerBtn">
                    <i class="fas fa-wind"></i> Wind Flow
                </button>
                <button class="layer-btn" data-layer="clouds" id="cloudsLayerBtn">
                    <i class="fas fa-cloud"></i> Cloud Cover
                </button>
                <button class="layer-btn" data-layer="precipitation" id="precipLayerBtn">
                    <i class="fas fa-cloud-rain"></i> Precipitation
                </button>
                <button class="layer-btn" data-layer="pressure" id="pressureLayerBtn">
                    <i class="fas fa-compress-arrows-alt"></i> Pressure
                </button>
                <button class="layer-btn" data-layer="all" id="allLayersBtn">
                    <i class="fas fa-layer-group"></i> All Layers
                </button>
            </div>
            
            <!-- The Map -->
            <div id="radarMap"></div>
            
            <!-- Color Legend -->
            <div class="legend-bar" id="legendBar">
                <span style="font-weight: 600;">Temperature (°C):</span>
                <div class="legend-item"><div class="legend-color" style="background: #313695;"></div> -20°</div>
                <div class="legend-item"><div class="legend-color" style="background: #4575b4;"></div> -10°</div>
                <div class="legend-item"><div class="legend-color" style="background: #74add1;"></div> 0°</div>
                <div class="legend-item"><div class="legend-color" style="background: #abd9e9;"></div> 10°</div>
                <div class="legend-item"><div class="legend-color" style="background: #fee090;"></div> 20°</div>
                <div class="legend-item"><div class="legend-color" style="background: #fdae61;"></div> 25°</div>
                <div class="legend-item"><div class="legend-color" style="background: #f46d43;"></div> 30°</div>
                <div class="legend-item"><div class="legend-color" style="background: #d73027;"></div> 35°+</div>
            </div>
        </div>

        <!-- Weather Summary -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
            <div class="weather-card">
                <div style="display: flex; justify-content: space-between;">
                    <div>
                        <span class="city-name" id="cityName">--</span>
                        <span class="country-badge" id="countryBadge">--</span>
                    </div>
                    <button class="icon-btn" id="favBtn"><i class="far fa-star" id="favIcon"></i></button>
                </div>
                <div style="font-size: 16px; color: var(--text-secondary); margin: 10px 0;">
                    <i class="far fa-clock"></i> <span id="localTime">--</span>
                </div>
                <div style="display: flex; align-items: center; gap: 20px;">
                    <i class="fas fa-cloud-sun" style="font-size: 64px;" id="weatherIcon"></i>
                    <div>
                        <div class="temperature" id="temperature">--°</div>
                        <div style="text-transform: capitalize; color: var(--text-secondary);" id="weatherDesc">--</div>
                        <div style="font-size: 14px; margin-top: 5px;">Feels like <span id="feelsLike">--</span>°</div>
                    </div>
                </div>
                <div class="metrics-grid">
                    <div class="metric-box"><div class="metric-icon">💧</div><div class="metric-value" id="humidity">--</div><div class="metric-label">Humidity</div></div>
                    <div class="metric-box"><div class="metric-icon">💨</div><div class="metric-value" id="windSpeed">--</div><div class="metric-label">Wind Speed</div></div>
                    <div class="metric-box"><div class="metric-icon">🎯</div><div class="metric-value" id="pressure">--</div><div class="metric-label">Pressure</div></div>
                    <div class="metric-box"><div class="metric-icon">👁️</div><div class="metric-value" id="visibility">--</div><div class="metric-label">Visibility</div></div>
                </div>
            </div>

            <div class="weather-card">
                <div class="section-title"><i class="fas fa-clock"></i> Hourly Forecast</div>
                <div style="display: flex; gap: 10px; overflow-x: auto;" id="hourlyForecast"></div>
                <div class="section-title" style="margin-top: 20px;"><i class="fas fa-calendar-alt"></i> 7-Day Forecast</div>
                <div id="dailyForecast"></div>
            </div>
        </div>
    </div>

    <div class="loading-overlay hidden" id="loadingOverlay">
        <div style="text-align: center;">
            <div class="loader-spinner"></div>
            <div style="margin-top: 15px; color: white;">Loading radar data...</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        (function() {
            const API_KEY = '0eda157224cdc2f4851c49d4a39c55fd';
            const BASE_URL = 'https://api.openweathermap.org/data/2.5';
            const GEO_URL = 'https://api.openweathermap.org/geo/1.0';
            
            let currentUnit = 'metric';
            let currentWeatherData = null;
            let radarMap = null;
            let currentLayer = 'temp';
            
            // Layer references
            let tempLayer, windLayer, cloudsLayer, precipLayer, pressureLayer;
            let baseMapLayer;
            
            let favorites = JSON.parse(localStorage.getItem('weatherFavorites') || '[]');
            let recentSearches = JSON.parse(localStorage.getItem('weatherRecent') || '[]');
            let clockInterval = null;
            let searchTimeout = null;

            function initRadarMap(lat, lon) {
                if (!radarMap) {
                    radarMap = L.map('radarMap', {
                        center: [lat, lon],
                        zoom: 6,
                        zoomControl: false
                    });

                    // Base map
                    const isLight = document.body.classList.contains('light-mode');
                    const tileUrl = isLight ? 
                        'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png' :
                        'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
                    
                    baseMapLayer = L.tileLayer(tileUrl, { maxZoom: 18, attribution: '© CartoDB' });
                    baseMapLayer.addTo(radarMap);

                    // Temperature layer (shows heat/colors)
                    tempLayer = L.tileLayer(
                        `https://tile.openweathermap.org/map/temp_new/{z}/{x}/{y}.png?appid=${API_KEY}`,
                        { maxZoom: 10, opacity: 0.7, attribution: 'Temp © OWM' }
                    );

                    // Wind flow layer
                    windLayer = L.tileLayer(
                        `https://tile.openweathermap.org/map/wind_new/{z}/{x}/{y}.png?appid=${API_KEY}`,
                        { maxZoom: 10, opacity: 0.7, attribution: 'Wind © OWM' }
                    );

                    // Cloud cover layer
                    cloudsLayer = L.tileLayer(
                        `https://tile.openweathermap.org/map/clouds_new/{z}/{x}/{y}.png?appid=${API_KEY}`,
                        { maxZoom: 10, opacity: 0.7, attribution: 'Clouds © OWM' }
                    );

                    // Precipitation layer
                    precipLayer = L.tileLayer(
                        `https://tile.openweathermap.org/map/precipitation_new/{z}/{x}/{y}.png?appid=${API_KEY}`,
                        { maxZoom: 10, opacity: 0.7, attribution: 'Rain © OWM' }
                    );

                    // Pressure layer
                    pressureLayer = L.tileLayer(
                        `https://tile.openweathermap.org/map/pressure_new/{z}/{x}/{y}.png?appid=${API_KEY}`,
                        { maxZoom: 10, opacity: 0.7, attribution: 'Pressure © OWM' }
                    );

                    // Add default layer
                    tempLayer.addTo(radarMap);
                    updateLegend('temp');
                    
                } else {
                    radarMap.setView([lat, lon], 6);
                }
            }

            function switchRadarLayer(layerName) {
                // Remove all layers
                if (tempLayer) radarMap.removeLayer(tempLayer);
                if (windLayer) radarMap.removeLayer(windLayer);
                if (cloudsLayer) radarMap.removeLayer(cloudsLayer);
                if (precipLayer) radarMap.removeLayer(precipLayer);
                if (pressureLayer) radarMap.removeLayer(pressureLayer);

                currentLayer = layerName;

                // Add selected layer(s)
                switch(layerName) {
                    case 'temp':
                        tempLayer.addTo(radarMap);
                        break;
                    case 'wind':
                        windLayer.addTo(radarMap);
                        break;
                    case 'clouds':
                        cloudsLayer.addTo(radarMap);
                        break;
                    case 'precipitation':
                        precipLayer.addTo(radarMap);
                        break;
                    case 'pressure':
                        pressureLayer.addTo(radarMap);
                        break;
                    case 'all':
                        tempLayer.addTo(radarMap);
                        windLayer.addTo(radarMap);
                        cloudsLayer.addTo(radarMap);
                        precipLayer.addTo(radarMap);
                        break;
                }

                updateLegend(layerName);
                updateActiveButton(layerName);
            }

            function updateLegend(layerName) {
                const legendBar = document.getElementById('legendBar');
                switch(layerName) {
                    case 'temp':
                        legendBar.innerHTML = `
                            <span style="font-weight:600;">Temperature (°C):</span>
                            <span class="legend-item"><span class="legend-color" style="background:#313695;"></span> -20°</span>
                            <span class="legend-item"><span class="legend-color" style="background:#4575b4;"></span> -10°</span>
                            <span class="legend-item"><span class="legend-color" style="background:#74add1;"></span> 0°</span>
                            <span class="legend-item"><span class="legend-color" style="background:#abd9e9;"></span> 10°</span>
                            <span class="legend-item"><span class="legend-color" style="background:#fee090;"></span> 20°</span>
                            <span class="legend-item"><span class="legend-color" style="background:#fdae61;"></span> 25°</span>
                            <span class="legend-item"><span class="legend-color" style="background:#f46d43;"></span> 30°</span>
                            <span class="legend-item"><span class="legend-color" style="background:#d73027;"></span> 35°+</span>
                        `;
                        break;
                    case 'wind':
                        legendBar.innerHTML = `
                            <span style="font-weight:600;">Wind Speed:</span>
                            <span class="legend-item"><span class="legend-color" style="background:#2b83ba;"></span> Calm</span>
                            <span class="legend-item"><span class="legend-color" style="background:#abdda4;"></span> Light</span>
                            <span class="legend-item"><span class="legend-color" style="background:#ffffbf;"></span> Moderate</span>
                            <span class="legend-item"><span class="legend-color" style="background:#fdae61;"></span> Strong</span>
                            <span class="legend-item"><span class="legend-color" style="background:#d7191c;"></span> Very Strong</span>
                        `;
                        break;
                    case 'clouds':
                        legendBar.innerHTML = `
                            <span style="font-weight:600;">Cloud Cover:</span>
                            <span class="legend-item"><span class="legend-color" style="background:transparent;"></span> Clear</span>
                            <span class="legend-item"><span class="legend-color" style="background:#ffffff99;"></span> Scattered</span>
                            <span class="legend-item"><span class="legend-color" style="background:#ffffffcc;"></span> Broken</span>
                            <span class="legend-item"><span class="legend-color" style="background:#ffffffff;"></span> Overcast</span>
                        `;
                        break;
                    case 'precipitation':
                        legendBar.innerHTML = `
                            <span style="font-weight:600;">Rain Rate:</span>
                            <span class="legend-item"><span class="legend-color" style="background:#a6f28f;"></span> Light</span>
                            <span class="legend-item"><span class="legend-color" style="background:#3dba3d;"></span> Moderate</span>
                            <span class="legend-item"><span class="legend-color" style="background:#1464ff;"></span> Heavy</span>
                            <span class="legend-item"><span class="legend-color" style="background:#fa00ff;"></span> Very Heavy</span>
                        `;
                        break;
                    case 'pressure':
                        legendBar.innerHTML = `
                            <span style="font-weight:600;">Pressure (hPa):</span>
                            <span class="legend-item"><span class="legend-color" style="background:#2c7bb6;"></span> Low</span>
                            <span class="legend-item"><span class="legend-color" style="background:#abd9e9;"></span> Mid-Low</span>
                            <span class="legend-item"><span class="legend-color" style="background:#ffffbf;"></span> Medium</span>
                            <span class="legend-item"><span class="legend-color" style="background:#fdae61;"></span> Mid-High</span>
                            <span class="legend-item"><span class="legend-color" style="background:#d7191c;"></span> High</span>
                        `;
                        break;
                    case 'all':
                        legendBar.innerHTML = `
                            <span style="font-weight:600;">Multi-Layer View:</span>
                            <span style="color:var(--text-secondary);"> Temperature | Wind | Clouds | Precipitation</span>
                        `;
                        break;
                }
            }

            function updateActiveButton(layerName) {
                document.querySelectorAll('.layer-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.layer === layerName) {
                        btn.classList.add('active');
                    }
                });
            }

            function getWeatherIcon(code) {
                const icons = {
                    '01d': 'fa-sun', '01n': 'fa-moon', '02d': 'fa-cloud-sun', '02n': 'fa-cloud-moon',
                    '03d': 'fa-cloud', '03n': 'fa-cloud', '04d': 'fa-cloud', '04n': 'fa-cloud',
                    '09d': 'fa-cloud-rain', '09n': 'fa-cloud-rain', '10d': 'fa-cloud-sun-rain',
                    '10n': 'fa-cloud-moon-rain', '11d': 'fa-bolt', '11n': 'fa-bolt',
                    '13d': 'fa-snowflake', '13n': 'fa-snowflake', '50d': 'fa-smog', '50n': 'fa-smog'
                };
                return icons[code] || 'fa-cloud';
            }

            function formatTime(timestamp, timezone) {
                const date = new Date((timestamp + timezone) * 1000);
                return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true, timeZone: 'UTC' });
            }

            function updateClock(timezone) {
                if (clockInterval) clearInterval(clockInterval);
                function tick() {
                    const now = new Date();
                    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
                    const cityTime = new Date(utc + (timezone * 1000));
                    document.getElementById('localTime').textContent = cityTime.toLocaleTimeString('en-US', {
                        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true, timeZone: 'UTC'
                    });
                }
                tick();
                clockInterval = setInterval(tick, 1000);
            }

            async function fetchWeatherData(lat, lon, cityName = '') {
                document.getElementById('loadingOverlay').classList.remove('hidden');
                try {
                    const [currentRes, forecastRes] = await Promise.all([
                        fetch(`${BASE_URL}/weather?lat=${lat}&lon=${lon}&units=${currentUnit}&appid=${API_KEY}`),
                        fetch(`${BASE_URL}/forecast?lat=${lat}&lon=${lon}&units=${currentUnit}&appid=${API_KEY}`)
                    ]);

                    if (!currentRes.ok) throw new Error('Failed to fetch weather');
                    const current = await currentRes.json();
                    const forecast = await forecastRes.json();

                    // Update current weather
                    currentWeatherData = current;
                    document.getElementById('cityName').textContent = current.name;
                    document.getElementById('countryBadge').textContent = current.sys.country;
                    document.getElementById('weatherIcon').className = `fas ${getWeatherIcon(current.weather[0].icon)}`;
                    document.getElementById('temperature').textContent = `${Math.round(current.main.temp)}°${currentUnit === 'metric' ? 'C' : 'F'}`;
                    document.getElementById('weatherDesc').textContent = current.weather[0].description;
                    document.getElementById('feelsLike').textContent = `${Math.round(current.main.feels_like)}°${currentUnit === 'metric' ? 'C' : 'F'}`;
                    document.getElementById('humidity').textContent = `${current.main.humidity}%`;
                    document.getElementById('windSpeed').textContent = `${(current.wind.speed * 3.6).toFixed(1)} km/h`;
                    document.getElementById('pressure').textContent = `${current.main.pressure} hPa`;
                    document.getElementById('visibility').textContent = `${(current.visibility / 1000).toFixed(1)} km`;
                    
                    updateClock(current.timezone);

                    // Hourly forecast
                    document.getElementById('hourlyForecast').innerHTML = forecast.list.slice(0, 6).map(item => `
                        <div style="text-align:center; min-width:70px; background:var(--glass-bg); padding:10px; border-radius:12px;">
                            <div style="font-size:12px; color:var(--text-secondary);">${formatTime(item.dt, current.timezone)}</div>
                            <i class="fas ${getWeatherIcon(item.weather[0].icon)}" style="font-size:24px; margin:5px 0;"></i>
                            <div style="font-weight:700;">${Math.round(item.main.temp)}°</div>
                        </div>
                    `).join('');

                    // Daily forecast
                    const dailyMap = new Map();
                    forecast.list.forEach(item => {
                        const day = new Date((item.dt + current.timezone) * 1000).toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric', timeZone:'UTC'});
                        if (!dailyMap.has(day)) dailyMap.set(day, {temps:[], icons:[]});
                        dailyMap.get(day).temps.push(item.main.temp);
                        dailyMap.get(day).icons.push(item.weather[0].icon);
                    });
                    
                    document.getElementById('dailyForecast').innerHTML = Array.from(dailyMap).slice(0,7).map(([day, data]) => `
                        <div class="daily-item">
                            <span style="font-weight:600; min-width:90px;">${day}</span>
                            <i class="fas ${getWeatherIcon(data.icons[Math.floor(data.icons.length/2)])}" style="font-size:24px;"></i>
                            <span>${Math.round(Math.max(...data.temps))}° / ${Math.round(Math.min(...data.temps))}°</span>
                        </div>
                    `).join('');

                    // Initialize/update radar map
                    initRadarMap(current.coord.lat, current.coord.lon);
                    
                    if (cityName) addToRecent(cityName);
                    else addToRecent(current.name);
                    
                    renderFavorites();
                } catch(e) {
                    console.error(e);
                    alert('Error loading weather data. Please try again.');
                } finally {
                    document.getElementById('loadingOverlay').classList.add('hidden');
                }
            }

            async function fetchCitySuggestions(query) {
                if (query.length < 2) { 
                    document.getElementById('suggestionsDropdown').classList.remove('active'); 
                    return; 
                }
                try {
                    const res = await fetch(`${GEO_URL}/direct?q=${encodeURIComponent(query)}&limit=5&appid=${API_KEY}`);
                    const data = await res.json();
                    if (data.length === 0) return;
                    
                    document.getElementById('suggestionsDropdown').innerHTML = data.map(c => `
                        <div class="suggestion-item" data-lat="${c.lat}" data-lon="${c.lon}" data-name="${c.name}">
                            <i class="fas fa-map-marker-alt"></i>
                            <div>
                                <div style="font-weight:600;">${c.name}</div>
                                <div style="font-size:12px; color:var(--text-secondary);">${c.state ? c.state + ', ' : ''}${c.country}</div>
                            </div>
                        </div>
                    `).join('');
                    
                    document.getElementById('suggestionsDropdown').classList.add('active');
                    
                    document.querySelectorAll('.suggestion-item').forEach(el => {
                        el.addEventListener('click', () => {
                            fetchWeatherData(el.dataset.lat, el.dataset.lon, el.dataset.name);
                            document.getElementById('searchInput').value = el.dataset.name;
                            document.getElementById('suggestionsDropdown').classList.remove('active');
                        });
                    });
                } catch(e) {}
            }

            function addToRecent(city) {
                recentSearches = [city, ...recentSearches.filter(c => c.toLowerCase() !== city.toLowerCase())].slice(0,5);
                localStorage.setItem('weatherRecent', JSON.stringify(recentSearches));
                renderFavorites();
            }

            function renderFavorites() {
                const allCities = [...new Set([...favorites, ...recentSearches])].slice(0,8);
                const container = document.getElementById('favoritesChips') || document.createElement('div');
                
                if (currentWeatherData) {
                    const isFav = favorites.includes(currentWeatherData.name);
                    document.getElementById('favIcon').className = isFav ? 'fas fa-star' : 'far fa-star';
                }
            }

            // Event Listeners
            document.getElementById('searchBtn').addEventListener('click', () => {
                const q = document.getElementById('searchInput').value.trim();
                if (q) fetchCitySuggestions(q);
            });
            
            document.getElementById('searchInput').addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => fetchCitySuggestions(e.target.value), 300);
            });
            
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const q = e.target.value.trim();
                    if (q) fetchCitySuggestions(q);
                }
            });
            
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-wrapper')) {
                    document.getElementById('suggestionsDropdown').classList.remove('active');
                }
            });
            
            document.getElementById('geoBtn').addEventListener('click', () => {
                navigator.geolocation.getCurrentPosition(
                    pos => fetchWeatherData(pos.coords.latitude, pos.coords.longitude),
                    () => alert('Location access denied')
                );
            });
            
            document.getElementById('themeToggle').addEventListener('click', () => {
                document.body.classList.toggle('light-mode');
                if (radarMap && baseMapLayer) {
                    radarMap.removeLayer(baseMapLayer);
                    const isLight = document.body.classList.contains('light-mode');
                    const tileUrl = isLight ? 
                        'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png' :
                        'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
                    baseMapLayer = L.tileLayer(tileUrl, { maxZoom: 18 });
                    baseMapLayer.addTo(radarMap);
                    // Bring weather layers to front
                    switchRadarLayer(currentLayer);
                }
                const icon = document.getElementById('themeToggle').querySelector('i');
                icon.className = document.body.classList.contains('light-mode') ? 'fas fa-sun' : 'fas fa-moon';
            });
            
            document.getElementById('unitToggle').addEventListener('click', () => {
                currentUnit = currentUnit === 'metric' ? 'imperial' : 'metric';
                document.getElementById('unitToggle').innerHTML = currentUnit === 'metric' ? 
                    '<span>°C</span> / <span style="opacity:0.5">°F</span>' :
                    '<span style="opacity:0.5">°C</span> / <span>°F</span>';
                if (currentWeatherData) {
                    fetchWeatherData(currentWeatherData.coord.lat, currentWeatherData.coord.lon, currentWeatherData.name);
                }
            });
            
            document.getElementById('favBtn').addEventListener('click', () => {
                if (currentWeatherData) {
                    const name = currentWeatherData.name;
                    if (favorites.includes(name)) {
                        favorites = favorites.filter(f => f !== name);
                    } else {
                        favorites.unshift(name);
                    }
                    localStorage.setItem('weatherFavorites', JSON.stringify(favorites));
                    renderFavorites();
                }
            });

            // Radar layer buttons
            document.querySelectorAll('.layer-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    switchRadarLayer(btn.dataset.layer);
                });
            });

            // Zoom controls
            document.getElementById('zoomInBtn').addEventListener('click', () => {
                if (radarMap) radarMap.zoomIn();
            });
            document.getElementById('zoomOutBtn').addEventListener('click', () => {
                if (radarMap) radarMap.zoomOut();
            });
            document.getElementById('resetViewBtn').addEventListener('click', () => {
                if (radarMap && currentWeatherData) {
                    radarMap.setView([currentWeatherData.coord.lat, currentWeatherData.coord.lon], 6);
                }
            });

            // Initialize with London
            fetchWeatherData(51.5074, -0.1278, 'London');
        })();
    </script>
</body>
</html>
